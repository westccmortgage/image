<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wallet WCCM · AI Mortgage Strategy Advisor — describe your mortgage scenario and the advisor compares possible loan paths, estimates real cash to close, and prepares the scenario for broker review."
    />
    <meta name="theme-color" content="#05070e" />
    <meta name="author" content="Anatoliy Kanevsky · California Real Estate Broker · CA DRE Broker License #01385024 · NMLS #2775380" />
    <meta name="publisher" content="West Coast Capital Mortgage Inc. · CA DRE Corporation License #02440065 · NMLS #2817729" />
    <title>Wallet WCCM · AI Mortgage Strategy Advisor</title>
    <!-- Structured data — licensing (company NMLS and individual NMLS are distinct). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MortgageBroker",
        "name": "West Coast Capital Mortgage Inc.",
        "url": "https://wwccm.com",
        "telephone": "+1-310-686-5053",
        "areaServed": "US-CA",
        "identifier": [
          { "@type": "PropertyValue", "propertyID": "CA DRE Corporation License", "value": "02440065" },
          { "@type": "PropertyValue", "propertyID": "NMLS", "value": "2817729" }
        ],
        "employee": {
          "@type": "RealEstateAgent",
          "name": "Anatoliy Kanevsky",
          "jobTitle": "California Real Estate Broker",
          "identifier": [
            { "@type": "PropertyValue", "propertyID": "CA DRE Broker License", "value": "01385024" },
            { "@type": "PropertyValue", "propertyID": "NMLS", "value": "2775380" }
          ]
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Hidden static form so Netlify detects "scenario-lead" at build time and
      captures JS submissions. Configure the recipient in:
      Netlify → Forms → scenario-lead → Form notifications → Email notification.
      No API keys or server code required.
    -->
    <form name="scenario-lead" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="contact_time" />
      <input type="text" name="language" />
      <input type="text" name="loan_purpose" />
      <input type="text" name="county" />
      <input type="text" name="purchase_price" />
      <input type="text" name="down_payment" />
      <input type="text" name="state" />
      <input type="text" name="zip_or_county" />
      <input type="text" name="occupancy" />
      <input type="text" name="employment" />
      <input type="text" name="income_doc" />
      <input type="text" name="goal" />
      <input type="text" name="fico" />
      <input type="text" name="loan_paths" />
      <input type="text" name="cash_to_close" />
      <textarea name="strategy_summary"></textarea>
      <input type="text" name="missing_required" />
      <input type="text" name="source_page" />
      <textarea name="original_message"></textarea>
      <textarea name="scenario_json"></textarea>
      <input name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
